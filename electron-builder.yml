appId: com.biome.app
productName: Biome
copyright: Copyright © 2026 Devansh Kumar

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: "Biome-${version}-Setup.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Biome
  createDesktopShortcut: true
  createStartMenuShortcut: true

asar: true
